name: Release Go Binary

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x' # Updated to match your local go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6 # Updated to v6 to support config version 2
        with:
          distribution: goreleaser
          version: '~> v2' # Force using GoReleaser v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}