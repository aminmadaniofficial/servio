version: 2

builds:
  - id: servio
    main: ./cmd/servio
    binary: servio
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

nfpms:
  - vendor: Amin Madani
    homepage: https://github.com/aminmadaniofficial/servio
    maintainer: Amin Madani
    description: A beautiful terminal UI for managing systemd services.
    license: MIT
    formats:
      - deb
      - rpm

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: aminmadaniofficial
    name: servio